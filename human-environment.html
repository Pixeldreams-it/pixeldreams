<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Environment Gallery | Pixeldreams</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Griglia principale fissa a 3 colonne */
        .internal-gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @media (max-width: 768px) {
            .internal-gallery-grid {
                grid-template-columns: 1fr;
            }
        }

        .internal-gallery-item {
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; /* Manina al passaggio del mouse */
        }
        .internal-gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
            object-fit: cover;
        }
        .internal-gallery-item img:hover {
            transform: scale(1.05);
        }
        
        .back-btn {
            display: inline-block;
            margin: 30px 5% 10px 5%;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .back-btn:hover { background-color: #555; }
        
        /* Divisore per creare la sezione nera di distacco */
        .gallery-spacer {
            height: 40px;
            width: 100%;
            background-color: transparent;
        }

        /* --- STILI LIGHTBOX (SCHERMO INTERO) --- */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.4s ease;
        }
        .lightbox-overlay.active .lightbox-img {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            user-select: none;
            transition: color 0.3s;
        }
        .lightbox-close:hover {
            color: #ccc;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <script>
      // Blocco tasto destro sulle immagini e sul lightbox
      window.addEventListener('contextmenu', function (e) {
        if (e.target.tagName === 'IMG' || e.target.closest('.internal-gallery-item') || e.target.closest('.lightbox-overlay')) {
          e.preventDefault();
        }
      }, true);

      // Logica per lo Schermo Intero (Lightbox)
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxClose = document.getElementById('lightboxClose');
      const galleryItems = document.querySelectorAll('.internal-gallery-grid .internal-gallery-item img');

      galleryItems.forEach(img => {
          img.addEventListener('click', () => {
              lightboxImg.src = img.src;
              lightbox.classList.add('active');
          });
      });

      lightboxClose.addEventListener('click', () => {
          lightbox.classList.remove('active');
      });

      lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) {
              lightbox.classList.remove('active');
          }
      });
    </script>
