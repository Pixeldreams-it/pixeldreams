    <style>
        /* Stili della griglia delle foto */
        .internal-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .internal-gallery-item {
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .internal-gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
            object-fit: cover;
        }
        .internal-gallery-item img:hover {
            transform: scale(1.05);
        }
        .back-btn {
            display: inline-block;
            margin: 30px 5%;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .back-btn:hover { background-color: #555; }
    </style>
</head>
